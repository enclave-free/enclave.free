<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EnclaveFree</title>
    <!-- Fonts: Inter for UI, JetBrains Mono for code -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <!-- Prevent flash of wrong theme -->
    <script>
      (function() {
        const THEME_KEY = 'enclavefree-theme';
        const LEGACY_THEME_KEY = 'sanctum-theme';
        const INSTANCE_CONFIG_KEY = 'enclavefree_instance_config';
        const LEGACY_INSTANCE_CONFIG_KEY = 'sanctum_instance_config';

        // Apply dark mode
        let theme;
        try {
          theme = localStorage.getItem(THEME_KEY);
          if (!theme) {
            const legacyTheme = localStorage.getItem(LEGACY_THEME_KEY);
            if (legacyTheme) {
              theme = legacyTheme;
              localStorage.setItem(THEME_KEY, legacyTheme);
              localStorage.removeItem(LEGACY_THEME_KEY);
            }
          }
        } catch (e) {
          /* localStorage throws (e.g. SecurityError in private browsing); skip theme persistence */
          theme = null;
        }
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (theme === 'dark' || (!theme && prefersDark)) {
          document.documentElement.classList.add('dark');
        }

        // Apply accent color from cached config
        try {
          let configRaw = localStorage.getItem(INSTANCE_CONFIG_KEY);
          if (!configRaw) {
            const legacyConfig = localStorage.getItem(LEGACY_INSTANCE_CONFIG_KEY);
            if (legacyConfig) {
              configRaw = legacyConfig;
              localStorage.setItem(INSTANCE_CONFIG_KEY, legacyConfig);
              localStorage.removeItem(LEGACY_INSTANCE_CONFIG_KEY);
            }
          }
          const config = JSON.parse(configRaw || '{}');
          const validColors = ['blue', 'purple', 'green', 'orange', 'pink', 'teal'];
          if (config.accentColor && validColors.includes(config.accentColor)) {
            document.documentElement.classList.add('accent-' + config.accentColor);
          }

          if (typeof config.name === 'string' && config.name.trim()) {
            document.title = config.name.trim();
          }

          if (typeof config.faviconUrl === 'string' && config.faviconUrl.trim()) {
            const existing = document.head.querySelector('link[rel="icon"][data-instance-branding="true"]');
            const link = existing || document.createElement('link');
            link.setAttribute('rel', 'icon');
            link.setAttribute('data-instance-branding', 'true');
            link.setAttribute('href', config.faviconUrl.trim());
            if (!existing) {
              document.head.appendChild(link);
            }
          }

          if (typeof config.appleTouchIconUrl === 'string' && config.appleTouchIconUrl.trim()) {
            const existing = document.head.querySelector('link[rel="apple-touch-icon"][data-instance-branding="true"]');
            const link = existing || document.createElement('link');
            link.setAttribute('rel', 'apple-touch-icon');
            link.setAttribute('data-instance-branding', 'true');
            link.setAttribute('href', config.appleTouchIconUrl.trim());
            if (!existing) {
              document.head.appendChild(link);
            }
          }
        } catch (e) {
          // Ignore parse errors, React will handle defaults
        }
      })();
    </script>
    <script type="module" crossorigin src="/assets/index-C1Ry-SX8.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-D_H_zlDS.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
