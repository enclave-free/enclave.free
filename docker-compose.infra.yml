services:
  maple-proxy:
    image: ghcr.io/opensecretcloud/maple-proxy:latest
    container_name: enclavefree-maple-proxy
    restart: unless-stopped
    environment:
      - MAPLE_BACKEND_URL=https://enclave.trymaple.ai
      - MAPLE_API_KEY=${MAPLE_API_KEY}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - enclavefree-net

  qdrant:
    image: qdrant/qdrant:v1.12.6
    container_name: enclavefree-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - enclavefree-net

  searxng:
    image: searxng/searxng:latest
    container_name: enclavefree-searxng
    volumes:
      - ./searxng:/etc/searxng:ro
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080/
      # Non-blocking default keeps quick-start/upgrades working; set a strong value in .env for production.
      - SEARXNG_SECRET=${SEARXNG_SECRET:-enclavefree-dev-searxng-secret-change-me}
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - enclavefree-net

volumes:
  qdrant_data:

networks:
  enclavefree-net:
    driver: bridge
